<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Clicksable — Creator Rewards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg0:#080808;--bg1:#0d0d0d;--bg2:#131313;--bg3:#1a1a1a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --lime:#C8FF00;--orange:#FF5A1F;
  --text:#ffffff;--text2:#a0a0a0;--text3:#606060;
  --danger:#FF3B3B;
  --sidebar:260px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg0);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ── AUTH GATE ── */
#auth-gate{
  position:fixed;inset:0;background:var(--bg0);z-index:2000;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-box{
  background:var(--bg1);border:1px solid var(--border2);
  border-radius:24px;padding:48px 40px;width:100%;max-width:400px;
  box-shadow:0 40px 100px rgba(0,0,0,.8);
}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;margin-bottom:6px;text-align:center;}
.auth-logo em{color:var(--lime);font-style:normal}
.auth-sub{font-size:12px;color:var(--text3);font-family:'Syne',sans-serif;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px;text-align:center;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.auth-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.auth-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;background:var(--lime);color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;transition:all .2s;margin-bottom:12px;}
.auth-btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.auth-error{color:var(--danger);font-size:12px;margin-bottom:16px;font-family:'Syne',sans-serif;display:none;text-align:center;}
.forgot-password{display:block;text-align:center;margin-top:16px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text3);text-decoration:underline;cursor:pointer;}

/* ── SIDEBAR & MAIN ── */
#app-wrapper{display:none;}
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:999;transition:transform 0.3s ease;}
.sb-logo{padding:28px 24px 24px;border-bottom:1px solid var(--border);}
.sb-logo .wordmark{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.sb-logo .wordmark em{color:var(--lime);font-style:normal}
.sb-section{padding:20px 0 8px;border-bottom:1px solid var(--border)}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 24px;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;}
.sb-item.active{color:var(--lime)}
.sb-footer{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border)}
.logout-btn{margin-top:16px; width:100%; padding:10px; border-radius:8px; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-family:'Syne',sans-serif; font-size:10px; text-transform:uppercase;}

#stage{margin-left:var(--sidebar);height:100vh;overflow-y:auto;padding:40px;}

/* MOBILE OVERRIDES */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #stage { margin-left: 0; padding: 20px; }
  .grid-title { font-size: 38px; }
  .d-body { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-logo">Click<em>sable</em>.</div>
    <div class="auth-sub">Creator Rewards Hub</div>
    <div id="auth-error" class="auth-error"></div>
    <div class="auth-field"><label>Email</label><input type="email" id="auth-email" class="auth-input"/></div>
    <div class="auth-field"><label>Password</label><input type="password" id="auth-password" class="auth-input"/></div>
    <button class="auth-btn" onclick="handleLogin()" id="btn-login">Log In</button>
    <button class="auth-btn secondary" onclick="handleSignUp()" id="btn-signup">Create Account</button>
    <a class="forgot-password" onclick="handleResetPassword()">Forgot Password?</a>
    <div id="reset-password-fields" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
      <div class="auth-field"><label>New Password</label><input type="password" id="new-password-input" class="auth-input"/></div>
      <button class="auth-btn" onclick="submitNewPassword()">Update Password</button>
    </div>
  </div>
</div>

<div id="app-wrapper">
  <nav id="sidebar">
    <div class="sb-logo"><div class="wordmark">Click<em>sable</em>.</div></div>
    <div class="sb-section">
      <a class="sb-item" href="#" data-view="rewards">Content Rewards</a>
      <a class="sb-item" href="#" data-view="profile">My Profile</a>
      <a class="sb-item" href="#" data-view="earnings">My Earnings</a>
    </div>
    <div class="sb-footer">
      <button class="logout-btn" onclick="handleLogout()">Log Out</button>
    </div>
  </nav>
  <main id="stage">
    <!-- View content will render here -->
  </main>
</div>

<script>
const leadDb = supabase.createClient('https://ctwrrrnjbytnthadpksl.supabase.co', 'sb_publishable_GgNKeidATKP54WWXGgfduQ_sq487yx_');

leadDb.auth.onAuthStateChange((event, session) => {
  if (session) {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app-wrapper').style.display = 'block';
  } else {
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('app-wrapper').style.display = 'none';
  }
});

async function handleLogin() {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  const { error } = await leadDb.auth.signInWithPassword({ email, password });
  if (error) alert(error.message);
}

async function handleSignUp() {
  const email = document.getElementById('auth-email').value;
  const password = document.getElementById('auth-password').value;
  const { error } = await leadDb.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Check your email!");
}

async function handleResetPassword() {
  const email = document.getElementById('auth-email').value;
  const { error } = await leadDb.auth.resetPasswordForEmail(email, { redirectTo: 'https://clicksable.com/creator-reward' });
  if (error) alert(error.message);
  else alert("Reset link sent!");
}

async function submitNewPassword() {
  const newPassword = document.getElementById('new-password-input').value;
  const { error } = await leadDb.auth.updateUser({ password: newPassword });
  if (error) alert(error.message);
  else { alert("Password updated!"); window.location.hash = ''; window.location.reload(); }
}

async function handleLogout() { await leadDb.auth.signOut(); }
</script>
</body>
</html>
